name: Frontend CI

on:
  pull_request:
    paths:
      - "src/Frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main]
    paths:
      - "src/Frontend/**"

defaults:
  run:
    working-directory: src/Frontend/sanalpos-web

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/Frontend/sanalpos-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Güvenlik taraması (npm audit)
        run: npm audit --audit-level=high
        continue-on-error: true
