# Dağıtım iskeleti: Docker imajlarını build edip GHCR'a publish eder.
# Gerçek ortam dağıtımı (staging/prod) altyapı hazır olduğunda eklenecektir
# (bkz. docs/13-devops-dagitim.md §5).
name: Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: API imajı
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/sanalpos-api:${{ github.ref_name }}
          docker build -f infra/Dockerfile.api -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Web imajı
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/sanalpos-web:${{ github.ref_name }}
          docker build -t "$IMAGE" src/Frontend/sanalpos-web
          docker push "$IMAGE"
