name: sanalpos

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sanalpos
      POSTGRES_USER: sanalpos
      POSTGRES_PASSWORD: sanalpos_dev_pw
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/db-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanalpos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports: ["5341:80"]

  # ISO 8583 banka simülatörü: sanalpos-api, "banksim" sağlayıcısı üzerinden
  # gerçek TCP/ISO 8583 akışını bu servise karşı koşar (yalnızca geliştirme).
  banksim:
    build:
      context: ../
      dockerfile: infra/Dockerfile.banksim
    ports: ["8583:8583"]
    environment:
      ISO8583_SIM_PORT: "8583"
      ISO8583_SIM_DIALECT: "Iso87Ascii"

  sanalpos-api:
    build:
      context: ../
      dockerfile: infra/Dockerfile.api
    ports: ["5000:8080"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Database=sanalpos;Username=sanalpos;Password=sanalpos_dev_pw"
      ConnectionStrings__Redis: "redis:6379,abortConnect=false"
      Persistence__Provider: "EfCore"
      Logging__Provider: "Serilog"
      Logging__Serilog__SeqUrl: "http://seq:80"
      Messaging__Provider: "RabbitMq"
      Messaging__RabbitMq__Host: "rabbitmq"
      Jwt__SigningKey: "dev-only-signing-key-min-32-chars-CHANGE-ME!"
      # 3DS SPA dönüş adresi: ACS callback'i sonrası tarayıcı bu origin'e yönlendirilebilir.
      ThreeDSecure__AllowedReturnUrls__0: "http://localhost:3000/"
      # ISO 8583 simülatör bankası: BankProviderCode = "BANKSIM" olan terminaller
      # gerçek ISO 8583 hattı üzerinden banksim servisine yönlenir.
      Iso8583__Banks__0__Enabled: "true"
      Iso8583__Banks__0__ProviderCode: "BANKSIM"
      Iso8583__Banks__0__Dialect: "Iso87Ascii"
      Iso8583__Banks__0__TerminalId: "TERM0001"
      Iso8583__Banks__0__MerchantId: "000000000000001"
      Iso8583__Banks__0__MerchantNameLocation: "SanalPOS Dev Merchant Istanbul TR"
      Iso8583__Banks__0__Channel__Host: "banksim"
      Iso8583__Banks__0__Channel__Port: "8583"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      banksim:
        condition: service_started

  sanalpos-web:
    build:
      context: ../src/Frontend/sanalpos-web
    ports: ["3000:80"]
    depends_on: [sanalpos-api]

volumes:
  pgdata:
